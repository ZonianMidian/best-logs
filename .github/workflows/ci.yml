name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier
        run: npx prettier --check .

      - name: Run ESLint
        run: npx eslint . --max-warnings=0

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Generate static pages
        run: npm run generate:static

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: best-logs
          path: |
            dist/
            public/
            package.json
            package-lock.json
            config.json
